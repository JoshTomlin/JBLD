events {}

http {
    server {
        listen 80;

        # server_name localhost;
        server_name trainbld.com www.trainbld.com;
        # Proxy to trainbld_website for root requests
        location / {
            proxy_pass http://trainbld_website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to trainbld_server for /parse requests
        location /parse {
            proxy_pass http://trainbld_server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

    }
}
